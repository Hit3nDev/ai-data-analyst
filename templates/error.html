{% extends "base.html" %}

{% block title %}{{ code }} Error – DataLab{% endblock %}

{% block content_class %}main-content-full{% endblock %}

{% block content %}
<div class="upload-page">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 text-center">
                <div class="error-icon">
                    <i class="bi {% if code == 404 %}bi-compass{% else %}bi-exclamation-octagon{% endif %}"></i>
                </div>
                <h1 class="error-code">{{ code }}</h1>
                <p class="error-message">{{ message }}</p>
                <a href="{{ url_for('index') }}" class="btn btn-dark mt-4">
                    <i class="bi bi-house-door me-2"></i>Back to Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
